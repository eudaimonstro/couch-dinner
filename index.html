<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>couch-dinner</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #e94560;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
        }

        .dice-container {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .d20 {
            width: 220px;
            height: 250px;
            background: linear-gradient(180deg, #ff6b8a 0%, #e94560 30%, #c73e54 70%, #a02040 100%);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.5);
            transition: transform 0.1s ease;
            user-select: none;
            position: relative;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            text-align: center;
            padding: 50px 25px;
            line-height: 1.3;
        }

        .d20::before {
            content: '';
            position: absolute;
            top: 5%;
            left: 15%;
            right: 15%;
            bottom: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 100%);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            pointer-events: none;
        }

        .d20:hover {
            transform: scale(1.05);
        }

        .d20:active {
            transform: scale(0.95);
        }

        .d20.rolling {
            animation: roll 0.5s ease-out;
        }

        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.1); }
            50% { transform: rotate(180deg) scale(1); }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .result {
            text-align: center;
            min-height: 100px;
            margin: 20px 0;
        }

        .result-meal {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
        }

        .result-meta {
            color: #aaa;
            font-size: 0.9rem;
        }

        .result-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #c73e54;
        }

        .btn-secondary {
            background: #333;
            color: white;
        }

        .btn-secondary:hover {
            background: #444;
        }

        .btn-danger {
            background: #8b0000;
            color: white;
        }

        .btn-danger:hover {
            background: #a00;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-top: 30px;
        }

        .section h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .week-meals {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .week-meal {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            overflow: hidden;
        }

        .week-meal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .week-meal-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .week-meal-info {
            flex: 1;
        }

        .week-meal-name {
            font-weight: 500;
        }

        .week-meal-meta {
            color: #888;
            font-size: 0.85rem;
        }

        .week-meal-expand {
            color: #888;
            font-size: 0.8rem;
            margin-left: 10px;
            transition: transform 0.2s ease;
        }

        .week-meal.expanded .week-meal-expand {
            transform: rotate(180deg);
        }

        .week-meal-prep {
            display: none;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            line-height: 1.6;
            color: #ccc;
        }

        .week-meal.expanded .week-meal-prep {
            display: block;
        }

        .week-meal-prep-title {
            color: #e94560;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .week-meal-ingredients {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 6px 20px;
            margin: 0;
            padding: 0;
        }

        .week-meal-ingredients li {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .remove-btn {
            background: none;
            border: none;
            color: #e94560;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
        }

        .remove-btn:hover {
            color: #ff6b8a;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        .shopping-list {
            margin-top: 15px;
        }

        .store-section {
            margin-bottom: 20px;
        }

        .store-section h3 {
            color: #e94560;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(233, 69, 96, 0.3);
        }

        .store-section ul {
            list-style: none;
        }

        .store-section li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .store-section li:last-child {
            border-bottom: none;
        }

        .ingredient-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .ingredient-name {
            flex: 1;
        }

        .ingredient-name.checked {
            text-decoration: line-through;
            color: #666;
        }

        .ingredient-count {
            color: #888;
            font-size: 0.85rem;
        }

        .list-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .instructions {
            text-align: center;
            color: #888;
            margin: 20px 0;
            font-size: 0.9rem;
        }

        .filter-toggle {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .toggle-label:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .toggle-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #e94560;
        }

        .toggle-text {
            color: #ccc;
            font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .d20 {
                width: 180px;
                height: 205px;
                font-size: 1rem;
                padding: 40px 20px;
            }

            .result-meal {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>couch-dinner</h1>
        <p class="subtitle">Roll for this week's meals!</p>

        <p class="instructions">Click the die to roll for a meal. Add it to your week, then generate your Aldi shopping list.</p>

        <div class="filter-toggle">
            <label class="toggle-label">
                <input type="checkbox" id="includeNonVeg">
                <span class="toggle-text">Include non-vegetarian meals</span>
            </label>
        </div>

        <div class="dice-container">
            <div class="d20" id="dice">
                <span id="diceNumber">Roll!</span>
            </div>
        </div>

        <div class="result" id="result">
            <p style="color: #666;">Roll the die to pick a meal!</p>
        </div>

        <div class="section">
            <h2>This Week's Meals <span id="mealCount">(0)</span></h2>
            <div class="week-meals" id="weekMeals">
                <div class="empty-state">No meals selected yet. Roll the die!</div>
            </div>
            <div class="list-actions" style="margin-top: 15px;">
                <button class="btn btn-danger" id="clearWeekBtn" disabled>Clear Week</button>
            </div>
        </div>

        <div class="section" id="shoppingSection" style="display: none;">
            <h2>Shopping List for Aldi</h2>
            <div class="shopping-list" id="shoppingList"></div>
            <div class="list-actions">
                <button class="btn btn-primary" id="copyListBtn">Copy List</button>
                <button class="btn btn-secondary" id="clearCheckedBtn">Clear Checked</button>
            </div>
        </div>
    </div>

    <script>
        // All data comes from our controlled recipes.json - no user-submitted content
        let recipes = [];
        let weekMeals = [];
        let currentRoll = null;
        let isRolling = false;

        // DOM elements
        const dice = document.getElementById('dice');
        const diceNumber = document.getElementById('diceNumber');
        const resultDiv = document.getElementById('result');
        const weekMealsDiv = document.getElementById('weekMeals');
        const mealCountSpan = document.getElementById('mealCount');
        const clearWeekBtn = document.getElementById('clearWeekBtn');
        const shoppingSection = document.getElementById('shoppingSection');
        const shoppingListDiv = document.getElementById('shoppingList');
        const copyListBtn = document.getElementById('copyListBtn');
        const clearCheckedBtn = document.getElementById('clearCheckedBtn');
        const includeNonVegCheckbox = document.getElementById('includeNonVeg');

        // Restore checkbox state
        includeNonVegCheckbox.checked = localStorage.getItem('dinnerD20_includeNonVeg') === 'true';
        includeNonVegCheckbox.addEventListener('change', function() {
            localStorage.setItem('dinnerD20_includeNonVeg', this.checked);
        });

        function getAvailableRecipes() {
            let pool = recipes;
            if (!includeNonVegCheckbox.checked) {
                pool = recipes.filter(r => r.vegetarian);
            }
            const weekIds = weekMeals.map(m => m.id);
            return pool.filter(r => !weekIds.includes(r.id));
        }

        // Event listeners
        dice.addEventListener('click', rollDice);
        clearWeekBtn.addEventListener('click', clearWeek);
        copyListBtn.addEventListener('click', copyList);
        clearCheckedBtn.addEventListener('click', clearChecked);

        // Load recipes
        fetch('recipes.json')
            .then(r => r.json())
            .then(data => {
                recipes = data.recipes;
                console.log('Loaded ' + recipes.length + ' recipes');
                // Restore any saved meals from localStorage
                loadFromStorage();
            })
            .catch(err => {
                console.error('Failed to load recipes:', err);
                resultDiv.textContent = 'Error loading recipes. Make sure recipes.json is in the same folder.';
                resultDiv.style.color = '#e94560';
            });

        function rollDice() {
            if (isRolling || recipes.length === 0) return;

            const available = getAvailableRecipes();

            if (available.length === 0) {
                showAllMealsSelected();
                return;
            }

            isRolling = true;
            dice.classList.add('rolling');

            let rolls = 0;
            const maxRolls = 15;
            const rollInterval = setInterval(() => {
                const randomMeal = available[Math.floor(Math.random() * available.length)];
                diceNumber.textContent = randomMeal.name;
                rolls++;

                if (rolls >= maxRolls) {
                    clearInterval(rollInterval);

                    const randomIndex = Math.floor(Math.random() * available.length);
                    currentRoll = available[randomIndex];

                    diceNumber.textContent = currentRoll.name;

                    dice.classList.remove('rolling');
                    isRolling = false;

                    showResult(currentRoll);
                }
            }, 50);
        }

        function showAllMealsSelected() {
            resultDiv.textContent = '';
            const p1 = document.createElement('p');
            p1.className = 'result-meal';
            p1.textContent = 'All meals selected!';
            const p2 = document.createElement('p');
            p2.className = 'result-meta';
            p2.textContent = 'Clear the week to roll again, or add more recipes to recipes.json';
            resultDiv.appendChild(p1);
            resultDiv.appendChild(p2);
        }

        function showResult(recipe) {
            resultDiv.textContent = '';

            const mealP = document.createElement('p');
            mealP.className = 'result-meal';
            mealP.textContent = recipe.name;

            const metaP = document.createElement('p');
            metaP.className = 'result-meta';
            metaP.textContent = recipe.category + ' \u2022 ' + recipe.time + ' minutes \u2022 ' + Object.keys(recipe.ingredients).length + ' ingredients' + (recipe.vegetarian ? '' : ' \u2022 non-vegetarian');

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'result-actions';

            const addBtn = document.createElement('button');
            addBtn.className = 'btn btn-primary';
            addBtn.textContent = 'Add to Week';
            addBtn.addEventListener('click', addToWeek);

            const rerollBtn = document.createElement('button');
            rerollBtn.className = 'btn btn-secondary';
            rerollBtn.textContent = 'Re-roll';
            rerollBtn.addEventListener('click', rollDice);

            actionsDiv.appendChild(addBtn);
            actionsDiv.appendChild(rerollBtn);

            resultDiv.appendChild(mealP);
            resultDiv.appendChild(metaP);
            resultDiv.appendChild(actionsDiv);
        }

        function saveToStorage() {
            localStorage.setItem('dinnerD20_weekMeals', JSON.stringify(weekMeals.map(m => m.id)));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('dinnerD20_weekMeals');
            if (saved) {
                try {
                    const ids = JSON.parse(saved);
                    weekMeals = ids.map(id => recipes.find(r => r.id === id)).filter(Boolean);
                    updateWeekDisplay();
                    updateShoppingList();
                } catch (e) {
                    console.error('Failed to load saved meals:', e);
                }
            }
        }

        function addToWeek() {
            if (!currentRoll) return;
            if (weekMeals.find(m => m.id === currentRoll.id)) return;

            weekMeals.push(currentRoll);
            currentRoll = null;

            updateWeekDisplay();
            updateShoppingList();
            saveToStorage();

            resultDiv.textContent = '';
            const p = document.createElement('p');
            p.style.color = '#4caf50';
            p.style.fontSize = '1.2rem';
            p.textContent = 'Added! Roll again for another meal.';
            resultDiv.appendChild(p);
        }

        function removeFromWeek(id) {
            weekMeals = weekMeals.filter(m => m.id !== id);
            updateWeekDisplay();
            updateShoppingList();
            saveToStorage();
        }

        function clearWeek() {
            weekMeals = [];
            currentRoll = null;
            updateWeekDisplay();
            updateShoppingList();
            saveToStorage();
            resultDiv.textContent = '';
            const p = document.createElement('p');
            p.style.color = '#666';
            p.textContent = 'Roll the die to pick a meal!';
            resultDiv.appendChild(p);
        }

        function updateWeekDisplay() {
            mealCountSpan.textContent = '(' + weekMeals.length + ')';
            clearWeekBtn.disabled = weekMeals.length === 0;

            weekMealsDiv.textContent = '';

            if (weekMeals.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = 'No meals selected yet. Roll the die!';
                weekMealsDiv.appendChild(empty);
                return;
            }

            weekMeals.forEach(meal => {
                const mealDiv = document.createElement('div');
                mealDiv.className = 'week-meal';

                // Header (clickable to expand)
                const headerDiv = document.createElement('div');
                headerDiv.className = 'week-meal-header';
                headerDiv.addEventListener('click', (e) => {
                    if (!e.target.closest('.remove-btn')) {
                        mealDiv.classList.toggle('expanded');
                    }
                });

                const infoDiv = document.createElement('div');
                infoDiv.className = 'week-meal-info';
                const nameDiv = document.createElement('div');
                nameDiv.className = 'week-meal-name';
                nameDiv.textContent = meal.name;
                const metaDiv = document.createElement('div');
                metaDiv.className = 'week-meal-meta';
                metaDiv.textContent = meal.category + ' \u2022 ' + meal.time + ' min' + (meal.vegetarian ? '' : ' \u2022 non-veg') + ' \u2022 tap for prep';
                infoDiv.appendChild(nameDiv);
                infoDiv.appendChild(metaDiv);

                const expandIcon = document.createElement('span');
                expandIcon.className = 'week-meal-expand';
                expandIcon.textContent = '\u25BC';

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.title = 'Remove';
                removeBtn.textContent = '\u2715';
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeFromWeek(meal.id);
                });

                headerDiv.appendChild(infoDiv);
                headerDiv.appendChild(expandIcon);
                headerDiv.appendChild(removeBtn);

                // Details section (hidden by default)
                const prepDiv = document.createElement('div');
                prepDiv.className = 'week-meal-prep';

                // Ingredients list
                const ingredientsTitle = document.createElement('div');
                ingredientsTitle.className = 'week-meal-prep-title';
                ingredientsTitle.textContent = 'Ingredients';
                prepDiv.appendChild(ingredientsTitle);

                const ingredientsList = document.createElement('ul');
                ingredientsList.className = 'week-meal-ingredients';
                Object.entries(meal.ingredients).forEach(([name, info]) => {
                    const li = document.createElement('li');
                    li.textContent = info.qty + ' ' + name;
                    ingredientsList.appendChild(li);
                });
                prepDiv.appendChild(ingredientsList);

                // Prep instructions
                const prepTitle = document.createElement('div');
                prepTitle.className = 'week-meal-prep-title';
                prepTitle.style.marginTop = '15px';
                prepTitle.textContent = 'Preparation';
                const prepText = document.createElement('div');
                prepText.textContent = meal.prep || 'No preparation instructions available.';
                prepDiv.appendChild(prepTitle);
                prepDiv.appendChild(prepText);

                mealDiv.appendChild(headerDiv);
                mealDiv.appendChild(prepDiv);
                weekMealsDiv.appendChild(mealDiv);
            });
        }

        function updateShoppingList() {
            if (weekMeals.length === 0) {
                shoppingSection.style.display = 'none';
                return;
            }

            shoppingSection.style.display = 'block';

            const bySection = {};
            const ingredientMeals = {};
            const ingredientQtys = {};

            weekMeals.forEach(meal => {
                Object.entries(meal.ingredients).forEach(([name, info]) => {
                    const storeSection = info.section || 'other';
                    const qty = info.qty || '';

                    if (!bySection[storeSection]) {
                        bySection[storeSection] = {};
                    }

                    if (!bySection[storeSection][name]) {
                        bySection[storeSection][name] = [];
                        ingredientMeals[name] = [];
                        ingredientQtys[name] = [];
                    }

                    bySection[storeSection][name].push(qty);
                    ingredientMeals[name].push(meal.name);
                    ingredientQtys[name].push(qty);
                });
            });

            const sectionOrder = [
                'produce', 'dairy', 'refrigerated', 'bakery', 'grains',
                'canned goods', 'international', 'frozen', 'oils',
                'spices', 'baking', 'snacks', 'health foods', 'alcohol', 'other'
            ];

            const sortedSections = Object.keys(bySection).sort((a, b) => {
                const aIndex = sectionOrder.indexOf(a);
                const bIndex = sectionOrder.indexOf(b);
                return (aIndex === -1 ? 999 : aIndex) - (bIndex === -1 ? 999 : bIndex);
            });

            shoppingListDiv.textContent = '';

            sortedSections.forEach(section => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'store-section';

                const h3 = document.createElement('h3');
                h3.textContent = section;
                sectionDiv.appendChild(h3);

                const ul = document.createElement('ul');

                const ingredients = Object.entries(bySection[section]).sort((a, b) => a[0].localeCompare(b[0]));

                ingredients.forEach(([name, qtys]) => {
                    const li = document.createElement('li');
                    const meals = ingredientMeals[name];

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'ingredient-checkbox';
                    checkbox.addEventListener('change', function() {
                        if (this.checked) {
                            nameSpan.classList.add('checked');
                        } else {
                            nameSpan.classList.remove('checked');
                        }
                    });

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'ingredient-name';
                    nameSpan.textContent = name;

                    li.appendChild(checkbox);
                    li.appendChild(nameSpan);

                    // Show quantities with meal names
                    const qtySpan = document.createElement('span');
                    qtySpan.className = 'ingredient-count';
                    if (qtys.length === 1) {
                        qtySpan.textContent = qtys[0] + ' (' + meals[0] + ')';
                    } else {
                        // Multiple meals need this ingredient - show each with meal name
                        const parts = qtys.map((qty, i) => qty + ' (' + meals[i] + ')');
                        qtySpan.textContent = parts.join(' + ');
                    }
                    li.appendChild(qtySpan);

                    ul.appendChild(li);
                });

                sectionDiv.appendChild(ul);
                shoppingListDiv.appendChild(sectionDiv);
            });
        }

        function clearChecked() {
            document.querySelectorAll('.ingredient-checkbox:checked').forEach(cb => {
                cb.checked = false;
                cb.nextElementSibling.classList.remove('checked');
            });
        }

        function copyList() {
            const sections = document.querySelectorAll('.store-section');
            let text = 'ALDI SHOPPING LIST\n==================\n\n';

            sections.forEach(section => {
                const title = section.querySelector('h3').textContent;
                const items = section.querySelectorAll('li');

                text += title.toUpperCase() + '\n';
                items.forEach(item => {
                    const name = item.querySelector('.ingredient-name').textContent;
                    const qtyEl = item.querySelector('.ingredient-count');
                    const checkbox = item.querySelector('.ingredient-checkbox');
                    const check = checkbox.checked ? '\u2611' : '\u2610';
                    const qty = qtyEl ? qtyEl.textContent : '';
                    text += check + ' ' + name + (qty ? ' - ' + qty : '') + '\n';
                });
                text += '\n';
            });

            text += '\nMEALS THIS WEEK\n';
            weekMeals.forEach(meal => {
                text += '\u2022 ' + meal.name + '\n';
            });

            navigator.clipboard.writeText(text).then(() => {
                alert('Shopping list copied to clipboard!');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('Shopping list copied to clipboard!');
            });
        }
    </script>
</body>
</html>
